<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Large Orders — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>



















*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6f8;--card:#fff;--border:#e4e7ec;--text:#1a1d23;--text2:#6b7280;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--orange:#f39c12;--red:#d63031;--blue:#0984e3}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow-x:hidden}
.topbar{background:linear-gradient(135deg,#2d1b69,#1a1145);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{color:#fff;font-size:17px;font-weight:600;display:flex;align-items:center;gap:10px}
.topbar .sub{color:#a29bfe;font-size:11px;margin-top:2px}
.live-badge{background:rgba(0,184,148,.12);color:#00b894;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:6px}
.live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#00b894;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 24px}
.tab{padding:11px 18px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--accent)}
.overview{padding:18px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.stat .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.stat .val{font-size:21px;font-weight:700;margin-top:4px}
.stat .det{font-size:10px;color:var(--text2);margin-top:2px}
.stat .bar{position:absolute;bottom:0;left:0;height:3px}
.filters{padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid var(--border)}
.search{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:190px;outline:none}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(108,92,231,.08)}
select{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:#fff;outline:none;cursor:pointer}
.count-badge{margin-left:auto;font-size:12px;font-weight:600;color:var(--text2);background:var(--bg);padding:4px 14px;border-radius:16px}
.clear-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:#fff;cursor:pointer;color:var(--text2)}
.tw{overflow-x:auto;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:10}
.hr th{padding:8px 10px;font-size:11px;font-weight:600;color:#fff;background:#2C3E50;border-right:1px solid rgba(255,255,255,.12);cursor:pointer;white-space:nowrap;user-select:none}
.hr th:hover{filter:brightness(1.2)}
tbody tr{border-bottom:1px solid #f0f1f3;cursor:pointer;transition:.12s}
tbody tr:hover{background:#f5f3ff}
tbody tr:nth-child(even){background:#fafbfc}
tbody tr:nth-child(even):hover{background:#f5f3ff}
td{padding:6px 10px;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;border-right:1px solid #f5f5f5}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.2px}
.b-created{background:#e8f5e9;color:#2e7d32}.b-accepted{background:#e3f2fd;color:#1565c0}
.b-pickup{background:#e0f2f1;color:#00695c}.b-pickup-fail{background:#ffebee;color:#c62828}
.b-qc-pending{background:#fff8e1;color:#f57f17}.b-qc-approved{background:#e8f5e9;color:#1b5e20}
.b-qc-hold{background:#fff3e0;color:#e65100}.b-qc-rejected{background:#fce4ec;color:#b71c1c}
.b-freight{background:#e8eaf6;color:#283593}.b-freight-dep{background:#e8eaf6;color:#3949ab}
.b-courier{background:#e1f5fe;color:#01579b}.b-courier-cust{background:#e0f7fa;color:#006064}
.b-lp{background:#f3e5f5;color:#6a1b9a}
.oms-filled{background:#e8f5e9;color:#1b5e20;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.oms-filled:hover{background:#c8e6c9}
.oms-pending{background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.oms-self{background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500}
.aging{font-weight:600;font-size:11px}
.a-ok{color:var(--green)}.a-w{color:var(--orange)}.a-bad{color:var(--red)}
.gmv-v{font-weight:600}.null{color:#d0d0d0;font-style:italic;font-size:10px}
.pag{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:#fff;border-top:1px solid var(--border)}
.pag button{padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:#fff;cursor:pointer}
.pag button:disabled{opacity:.3;cursor:default}
.pag span{font-size:11px;color:var(--text2)}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,15,30,.45);z-index:100;display:flex;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
.modal{background:#f5f6f8;border-radius:14px;width:100%;max-width:1100px;margin:10px auto;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.d-head{background:#fff;padding:20px 28px;border-bottom:1px solid var(--border)}
.d-head .d-top{display:flex;justify-content:space-between;align-items:flex-start}
.d-head h2{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.d-head h2 span{font-weight:400;color:var(--text2);font-size:15px}
.d-head .d-item{color:var(--text2);font-size:13px;margin-top:4px}
.d-head .d-tags{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.zone-tag{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:500}
.zone-pk-z{background:#1a1d23;color:#fff}
.zone-pk-nz{background:#374151;color:#fff}
.zone-in{background:#1565c0;color:#fff}
.zone-row{background:#6c5ce7;color:#fff}
.gmv-tag{color:var(--accent);font-size:18px;font-weight:700}
.rework-tag{background:#d63031;color:#fff;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.4px}
.track-tag{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
.track-ok{background:#e8f5e9;color:#1b5e20}
.track-delay{background:#ffebee;color:#c62828}
.track-warn{background:#fff8e1;color:#f57f17}
.track-blocked{background:#fce4ec;color:#880e4f;border:1px dashed #e91e63}
.ship-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.ship-air{background:#e3f2fd;color:#1565c0}
.ship-sea{background:#e0f2f1;color:#00695c}
.ship-seaair{background:#e8eaf6;color:#283593}
.close-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
.close-btn:hover{background:var(--bg)}
.timeline{background:#fff;margin:16px 20px 0;border-radius:12px;padding:24px 28px;border:1px solid var(--border)}
.tl-track{display:flex;align-items:flex-start;position:relative;justify-content:space-between}
.tl-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;z-index:2}
.tl-dot{width:20px;height:20px;border-radius:50%;border:2px solid #d0d5dd;background:#fff;display:flex;align-items:center;justify-content:center;transition:.2s}
.tl-dot.active{border-color:var(--accent);background:var(--accent)}
.tl-dot.active::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.tl-dot.done{border-color:var(--accent);background:var(--accent)}
.tl-dot.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.tl-dot.warn{border-color:var(--orange);background:var(--orange)}
.tl-dot.warn::after{content:'!';color:#fff;font-size:10px;font-weight:700}
.tl-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin-top:8px;text-align:center}
.tl-date{font-size:10px;color:var(--text2);margin-top:2px;text-align:center}
.tl-days{font-size:9px;color:var(--accent);font-weight:600;margin-top:2px;text-align:center;background:#f0eeff;padding:1px 6px;border-radius:8px}
.tl-line{position:absolute;top:10px;left:0;right:0;height:2px;background:#e4e7ec;z-index:1}
.tl-line-fill{height:2px;background:var(--accent);transition:.3s}
.d-body{padding:16px 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.d-section{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.d-section.full{grid-column:1/-1}
.d-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);font-weight:700;margin-bottom:10px}
.d-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5f6f8;font-size:12px}
.d-row:last-child{border-bottom:none}
.d-row .k{color:var(--text2)}.d-row .v{font-weight:500;text-align:right;max-width:260px;overflow:hidden;text-overflow:ellipsis}
.d-row .v.red{color:var(--red)}.d-row .v.green{color:var(--green)}.d-row .v.orange{color:var(--orange)}
.dispatch-grid{display:flex;gap:16px;justify-content:space-around;text-align:center;padding:8px 0}
.dispatch-item .dv{font-size:20px;font-weight:700;color:var(--text)}
.dispatch-item .dv.empty{color:#d0d0d0}
.dispatch-item .dl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-top:4px;font-weight:600}
.oms-detail-filled{display:inline-flex;align-items:center;gap:6px;background:#e8f5e9;color:#1b5e20;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none}
.oms-detail-filled:hover{background:#c8e6c9}
.oms-detail-pending{display:inline-flex;align-items:center;gap:4px;background:#fff3e0;color:#e65100;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600}
.oms-detail-self{display:inline-flex;align-items:center;gap:4px;background:#f3f4f6;color:#6b7280;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500}
.rw-badge-detail{display:inline-flex;align-items:center;gap:4px;background:#d63031;color:#fff;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600}
.ff-progress{display:flex;align-items:center;gap:8px;margin:12px 0 6px}
.ff-bar-bg{flex:1;height:8px;background:#e4e7ec;border-radius:4px;overflow:hidden}
.ff-bar-fill{height:100%;border-radius:4px;transition:.3s}
.ff-pct{font-size:11px;font-weight:700;min-width:36px;text-align:right}
.oms-block{background:#fce4ec;border:1px dashed #e91e63;border-radius:8px;padding:10px 14px;margin:8px 0;display:flex;align-items:center;gap:10px}
.oms-block-icon{font-size:18px}
.oms-block-text{font-size:12px;color:#880e4f;font-weight:600}
.oms-block-sub{font-size:10px;color:#ad1457;font-weight:400;margin-top:2px}
.oms-aging{display:flex;align-items:center;gap:16px;margin:10px 0 12px 0;padding:10px 14px;background:#f8f9ff;border:1px solid #e0e3ff;border-radius:8px}
.oms-aging-item{display:flex;flex-direction:column;gap:2px}
.oms-aging-label{font-size:10px;color:var(--text2);font-weight:500}
.oms-aging-val{font-size:12px;font-weight:600;color:var(--text)}
.oms-aging-arrow{font-size:14px;color:#9ca3af;margin:0 2px}
.oms-aging-days{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.oms-aging-days.fast{background:#e8f5e9;color:#1b5e20}
.oms-aging-days.medium{background:#fff3e0;color:#e65100}
.oms-aging-days.slow{background:#fce4ec;color:#c62828}
.ff-calc{background:#f0f4ff;border:1px solid #d0d9f0;border-radius:6px;padding:6px 12px;margin:6px 0;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.ff-calc strong{color:var(--text)}
.trk-list{margin-top:6px}
.trk-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:11px;background:#f8f9fa;border:1px solid #eee}
.trk-item:hover{background:#f0eeff;border-color:#d0c9ff}
.trk-num{font-family:'SF Mono',Monaco,Consolas,monospace;font-weight:600;color:var(--text);letter-spacing:.3px}
.trk-co{color:var(--text2);font-size:10px;margin-left:auto}
.trk-status{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.trk-status.success{background:#e8f5e9;color:#1b5e20}
.trk-status.pending{background:#fff8e1;color:#f57f17}
.trk-date{font-size:10px;color:var(--text2)}
.trk-count{display:inline-flex;align-items:center;justify-content:center;background:#e8eaf6;color:#283593;font-size:9px;font-weight:700;min-width:18px;height:18px;border-radius:9px;padding:0 5px}
.trk-empty{color:#d0d0d0;font-style:italic;font-size:11px;padding:8px 0}
.flight-section{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.flight-item{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;margin-bottom:3px;font-size:11px;background:#f0f4ff;border:1px solid #d0d9f0}
.flight-label{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.qc-timeline{display:flex;gap:0;margin:8px 0;position:relative}
.qc-step{flex:1;text-align:center;position:relative;padding:8px 4px}
.qc-step-dot{width:14px;height:14px;border-radius:50%;border:2px solid #d0d5dd;background:#fff;margin:0 auto 4px;position:relative;z-index:2}
.qc-step-dot.done{border-color:var(--accent);background:var(--accent)}
.qc-step-dot.hold{border-color:var(--orange);background:var(--orange)}
.qc-step-dot.active{border-color:var(--orange);background:var(--orange);box-shadow:0 0 0 3px rgba(243,156,18,.2)}
.qc-step-label{font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.qc-step-date{font-size:9px;color:var(--text2);margin-top:1px}
.qc-step-days{font-size:9px;font-weight:600;color:var(--accent);background:#f0eeff;padding:0 5px;border-radius:4px;display:inline-block;margin-top:2px}
.qc-line{position:absolute;top:15px;left:25%;right:25%;height:2px;background:#e4e7ec;z-index:1}
.qc-hold-box{background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;padding:10px 14px;margin:8px 0}
.qc-hold-reason{font-size:11px;color:#e65100;font-weight:500;margin-bottom:6px}
.qc-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.qc-link{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;transition:.15s}
.qc-link-report{background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb}
.qc-link-report:hover{background:#bbdefb}
.qc-link-slack{background:#f3e5f5;color:#6a1b9a;border:1px solid #e1bee7}
.qc-link-slack:hover{background:#e1bee7}
.qc-total{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.qc-total.fast{background:#e8f5e9;color:#1b5e20}
.qc-total.medium{background:#fff8e1;color:#f57f17}
.qc-total.slow{background:#ffebee;color:#c62828}




/* Batching & Refund styles */
.batch-count{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.refund-flag{background:#fce4ec;color:#c62828;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.batch-hdr-count{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.refund-hdr-flag{background:#fce4ec;color:#c62828;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.batch-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.batch-row{display:grid;grid-template-columns:1fr 1fr 1fr 1.5fr;gap:8px;padding:6px 10px;background:var(--card-bg,#fff);border:1px solid var(--border,#e5e5e5);border-radius:6px;font-size:11px;align-items:center}
.batch-num{font-weight:600;color:var(--accent,#2563eb)}
.batch-status{font-size:11px}
.batch-date{color:var(--text2,#666);font-size:10px}
.batch-trk{font-family:monospace;font-size:10px;color:var(--text2,#666);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.batch-empty{text-align:center;padding:16px;color:var(--text2,#666);font-size:12px;background:var(--card-bg,#f8f8f8);border-radius:6px;border:1px dashed var(--border,#ddd)}
.refund-detail{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:#fce4ec;border-radius:6px;font-size:12px;color:#c62828;font-weight:500}
.refund-icon{font-weight:800;font-size:14px}


/* Batching & Refund styles */
.batch-count{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}

.batch-hdr-count{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.refund-hdr-flag{background:#fce4ec;color:#c62828;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.batch-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.batch-row{display:grid;grid-template-columns:1fr 1fr 1fr 1.5fr;gap:8px;padding:6px 10px;background:var(--card-bg,#fff);border:1px solid var(--border,#e5e5e5);border-radius:6px;font-size:11px;align-items:center}
.batch-num{font-weight:600;color:var(--accent,#2563eb)}
.batch-status{font-size:11px}

.refund-detail{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:#fce4ec;border-radius:6px;font-size:12px;color:#c62828;font-weight:500}
.refund-icon{font-weight:800;font-size:14px}


/* ===== ALERTS TAB ===== */
.alerts-wrap{padding:12px 16px;max-width:1200px;margin:0 auto}





.alert-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.alert-title{font-weight:700;font-size:13px;color:var(--text)}
.alert-count{font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;min-width:24px;text-align:center}
.alert-body{padding:0 16px 14px;border-top:1px solid var(--border)}
.alert-table{margin-top:10px}
.at-hdr{display:grid;grid-template-columns:140px 60px 1fr;gap:8px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;padding:6px 0;border-bottom:1px solid var(--border)}
.at-row{display:grid;grid-template-columns:140px 60px 1fr;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:12px;align-items:center}
.at-am{font-weight:700;color:var(--text)}
.at-cnt{font-weight:700;color:#e91e63;text-align:center}
.at-ids{display:flex;flex-wrap:wrap;gap:4px}
.at-id{background:#f5f5f5;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;color:var(--accent);cursor:pointer;transition:background .15s}
.at-id:hover{background:#e3f2fd}
.alert-mini-table{margin-top:10px}
.amt-row{display:grid;grid-template-columns:110px 1fr 120px 100px 100px;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:11px;align-items:center;cursor:pointer}
.amt-row:hover{background:#fafafa}
.amt-id{font-weight:700;color:var(--accent)}
.amt-vendor{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.amt-delay{font-weight:700;font-size:11px}
.amt-am{color:var(--text2);font-size:10px}
.stuck-grid{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.stuck-band{padding:10px 12px;border-radius:8px;border:1px solid var(--border)}
.stuck-band-hdr{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text)}
.stuck-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.stuck-cnt{background:#f5f5f5;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-left:4px}

/* ===== AM VIEW ===== */
.am-wrap{padding:12px 16px;max-width:1400px;margin:0 auto}
.am-selector{margin-bottom:12px}
.am-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.am-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#f5f5f5;color:var(--text);border:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px}
.am-pill:hover{background:#e8eaf6}
.am-pill.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.am-pill-cnt{background:rgba(0,0,0,.1);padding:1px 7px;border-radius:10px;font-size:10px}
.am-pill.active .am-pill-cnt{background:rgba(255,255,255,.25)}
.am-summary{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.am-s-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px}
.am-s-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.am-s-card{background:#f8f9fa;border-radius:8px;padding:10px 8px;text-align:center;border:1px solid var(--border)}
.am-s-num{font-size:22px;font-weight:800;color:var(--text)}
.am-s-lbl{font-size:9px;color:var(--text2);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.am-s-green .am-s-num{color:#2e7d32}
.am-s-orange .am-s-num{color:#e65100}
.am-s-red .am-s-num{color:#d32f2f}
.am-s-pink .am-s-num{color:#e91e63}
.am-s-dark .am-s-num{color:#c62828}
.am-s-purple .am-s-num{color:#6a1b9a}
.am-s-brown .am-s-num{color:#4e342e}
