<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Large Orders — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>



















*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6f8;--card:#fff;--border:#e4e7ec;--text:#1a1d23;--text2:#6b7280;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--orange:#f39c12;--red:#d63031;--blue:#0984e3}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow-x:hidden}
.topbar{background:linear-gradient(135deg,#2d1b69,#1a1145);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{color:#fff;font-size:17px;font-weight:600;display:flex;align-items:center;gap:10px}
.topbar .sub{color:#a29bfe;font-size:11px;margin-top:2px}
.live-badge{background:rgba(0,184,148,.12);color:#00b894;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:6px}
.live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#00b894;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 24px}
.tab{padding:11px 18px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--accent)}
.overview{padding:18px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.stat .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.stat .val{font-size:21px;font-weight:700;margin-top:4px}
.stat .det{font-size:10px;color:var(--text2);margin-top:2px}
.stat .bar{position:absolute;bottom:0;left:0;height:3px}
.filters{padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid var(--border)}
.search{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:190px;outline:none}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(108,92,231,.08)}
select{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:#fff;outline:none;cursor:pointer}
.count-badge{margin-left:auto;font-size:12px;font-weight:600;color:var(--text2);background:var(--bg);padding:4px 14px;border-radius:16px}
.clear-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:#fff;cursor:pointer;color:var(--text2)}
.tw{overflow-x:auto;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:10}
.hr th{padding:8px 10px;font-size:11px;font-weight:600;color:#fff;background:#2C3E50;border-right:1px solid rgba(255,255,255,.12);cursor:pointer;white-space:nowrap;user-select:none}
.hr th:hover{filter:brightness(1.2)}
tbody tr{border-bottom:1px solid #f0f1f3;cursor:pointer;transition:.12s}
tbody tr:hover{background:#f5f3ff}
tbody tr:nth-child(even){background:#fafbfc}
tbody tr:nth-child(even):hover{background:#f5f3ff}
td{padding:6px 10px;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;border-right:1px solid #f5f5f5}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.2px}
.b-created{background:#e8f5e9;color:#2e7d32}.b-accepted{background:#e3f2fd;color:#1565c0}
.b-pickup{background:#e0f2f1;color:#00695c}.b-pickup-fail{background:#ffebee;color:#c62828}
.b-qc-pending{background:#fff8e1;color:#f57f17}.b-qc-approved{background:#e8f5e9;color:#1b5e20}
.b-qc-hold{background:#fff3e0;color:#e65100}.b-qc-rejected{background:#fce4ec;color:#b71c1c}
.b-freight{background:#e8eaf6;color:#283593}.b-freight-dep{background:#e8eaf6;color:#3949ab}
.b-courier{background:#e1f5fe;color:#01579b}.b-courier-cust{background:#e0f7fa;color:#006064}
.b-lp{background:#f3e5f5;color:#6a1b9a}
.oms-filled{background:#e8f5e9;color:#1b5e20;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.oms-filled:hover{background:#c8e6c9}
.oms-pending{background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.oms-self{background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500}
.aging{font-weight:600;font-size:11px}
.a-ok{color:var(--green)}.a-w{color:var(--orange)}.a-bad{color:var(--red)}
.gmv-v{font-weight:600}.null{color:#d0d0d0;font-style:italic;font-size:10px}
.pag{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;background:#fff;border-top:1px solid var(--border)}
.pag button{padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:#fff;cursor:pointer}
.pag button:disabled{opacity:.3;cursor:default}
.pag span{font-size:11px;color:var(--text2)}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,15,30,.45);z-index:100;display:flex;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
.modal{background:#f5f6f8;border-radius:14px;width:100%;max-width:1100px;margin:10px auto;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.d-head{background:#fff;padding:20px 28px;border-bottom:1px solid var(--border)}
.d-head .d-top{display:flex;justify-content:space-between;align-items:flex-start}
.d-head h2{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.d-head h2 span{font-weight:400;color:var(--text2);font-size:15px}
.d-head .d-item{color:var(--text2);font-size:13px;margin-top:4px}
.d-head .d-tags{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.zone-tag{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:500}
.zone-pk-z{background:#1a1d23;color:#fff}
.zone-pk-nz{background:#374151;color:#fff}
.zone-in{background:#1565c0;color:#fff}
.zone-row{background:#6c5ce7;color:#fff}
.gmv-tag{color:var(--accent);font-size:18px;font-weight:700}
.rework-tag{background:#d63031;color:#fff;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.4px}
.track-tag{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
.track-ok{background:#e8f5e9;color:#1b5e20}
.track-delay{background:#ffebee;color:#c62828}
.track-warn{background:#fff8e1;color:#f57f17}
.track-blocked{background:#fce4ec;color:#880e4f;border:1px dashed #e91e63}
.ship-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.ship-air{background:#e3f2fd;color:#1565c0}
.ship-sea{background:#e0f2f1;color:#00695c}
.ship-seaair{background:#e8eaf6;color:#283593}
.close-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
.close-btn:hover{background:var(--bg)}
.timeline{background:#fff;margin:16px 20px 0;border-radius:12px;padding:24px 28px;border:1px solid var(--border)}
.tl-track{display:flex;align-items:flex-start;position:relative;justify-content:space-between}
.tl-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;z-index:2}
.tl-dot{width:20px;height:20px;border-radius:50%;border:2px solid #d0d5dd;background:#fff;display:flex;align-items:center;justify-content:center;transition:.2s}
.tl-dot.active{border-color:var(--accent);background:var(--accent)}
.tl-dot.active::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.tl-dot.done{border-color:var(--accent);background:var(--accent)}
.tl-dot.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.tl-dot.warn{border-color:var(--orange);background:var(--orange)}
.tl-dot.warn::after{content:'!';color:#fff;font-size:10px;font-weight:700}
.tl-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin-top:8px;text-align:center}
.tl-date{font-size:10px;color:var(--text2);margin-top:2px;text-align:center}
.tl-days{font-size:9px;color:var(--accent);font-weight:600;margin-top:2px;text-align:center;background:#f0eeff;padding:1px 6px;border-radius:8px}
.tl-line{position:absolute;top:10px;left:0;right:0;height:2px;background:#e4e7ec;z-index:1}
.tl-line-fill{height:2px;background:var(--accent);transition:.3s}
.d-body{padding:16px 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.d-section{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.d-section.full{grid-column:1/-1}
.d-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);font-weight:700;margin-bottom:10px}
.d-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5f6f8;font-size:12px}
.d-row:last-child{border-bottom:none}
.d-row .k{color:var(--text2)}.d-row .v{font-weight:500;text-align:right;max-width:260px;overflow:hidden;text-overflow:ellipsis}
.d-row .v.red{color:var(--red)}.d-row .v.green{color:var(--green)}.d-row .v.orange{color:var(--orange)}
.dispatch-grid{display:flex;gap:16px;justify-content:space-around;text-align:center;padding:8px 0}
.dispatch-item .dv{font-size:20px;font-weight:700;color:var(--text)}
.dispatch-item .dv.empty{color:#d0d0d0}
.dispatch-item .dl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-top:4px;font-weight:600}
.oms-detail-filled{display:inline-flex;align-items:center;gap:6px;background:#e8f5e9;color:#1b5e20;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none}
.oms-detail-filled:hover{background:#c8e6c9}
.oms-detail-pending{display:inline-flex;align-items:center;gap:4px;background:#fff3e0;color:#e65100;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600}
.oms-detail-self{display:inline-flex;align-items:center;gap:4px;background:#f3f4f6;color:#6b7280;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500}
.rw-badge-detail{display:inline-flex;align-items:center;gap:4px;background:#d63031;color:#fff;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600}
.ff-progress{display:flex;align-items:center;gap:8px;margin:12px 0 6px}
.ff-bar-bg{flex:1;height:8px;background:#e4e7ec;border-radius:4px;overflow:hidden}
.ff-bar-fill{height:100%;border-radius:4px;transition:.3s}
.ff-pct{font-size:11px;font-weight:700;min-width:36px;text-align:right}
.oms-block{background:#fce4ec;border:1px dashed #e91e63;border-radius:8px;padding:10px 14px;margin:8px 0;display:flex;align-items:center;gap:10px}
.oms-block-icon{font-size:18px}
.oms-block-text{font-size:12px;color:#880e4f;font-weight:600}
.oms-block-sub{font-size:10px;color:#ad1457;font-weight:400;margin-top:2px}
.oms-aging{display:flex;align-items:center;gap:16px;margin:10px 0 12px 0;padding:10px 14px;background:#f8f9ff;border:1px solid #e0e3ff;border-radius:8px}
.oms-aging-item{display:flex;flex-direction:column;gap:2px}
.oms-aging-label{font-size:10px;color:var(--text2);font-weight:500}
.oms-aging-val{font-size:12px;font-weight:600;color:var(--text)}
.oms-aging-arrow{font-size:14px;color:#9ca3af;margin:0 2px}
.oms-aging-days{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.oms-aging-days.fast{background:#e8f5e9;color:#1b5e20}
.oms-aging-days.medium{background:#fff3e0;color:#e65100}
.oms-aging-days.slow{background:#fce4ec;color:#c62828}
.ff-calc{background:#f0f4ff;border:1px solid #d0d9f0;border-radius:6px;padding:6px 12px;margin:6px 0;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.ff-calc strong{color:var(--text)}
.trk-list{margin-top:6px}
.trk-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:11px;background:#f8f9fa;border:1px solid #eee}
.trk-item:hover{background:#f0eeff;border-color:#d0c9ff}
.trk-num{font-family:'SF Mono',Monaco,Consolas,monospace;font-weight:600;color:var(--text);letter-spacing:.3px}
.trk-co{color:var(--text2);font-size:10px;margin-left:auto}
.trk-status{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.trk-status.success{background:#e8f5e9;color:#1b5e20}
.trk-status.pending{background:#fff8e1;color:#f57f17}
.trk-date{font-size:10px;color:var(--text2)}
.trk-count{display:inline-flex;align-items:center;justify-content:center;background:#e8eaf6;color:#283593;font-size:9px;font-weight:700;min-width:18px;height:18px;border-radius:9px;padding:0 5px}
.trk-empty{color:#d0d0d0;font-style:italic;font-size:11px;padding:8px 0}
.flight-section{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.flight-item{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;margin-bottom:3px;font-size:11px;background:#f0f4ff;border:1px solid #d0d9f0}
.flight-label{font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.qc-timeline{display:flex;gap:0;margin:8px 0;position:relative}
.qc-step{flex:1;text-align:center;position:relative;padding:8px 4px}
.qc-step-dot{width:14px;height:14px;border-radius:50%;border:2px solid #d0d5dd;background:#fff;margin:0 auto 4px;position:relative;z-index:2}
.qc-step-dot.done{border-color:var(--accent);background:var(--accent)}
.qc-step-dot.hold{border-color:var(--orange);background:var(--orange)}
.qc-step-dot.active{border-color:var(--orange);background:var(--orange);box-shadow:0 0 0 3px rgba(243,156,18,.2)}
.qc-step-label{font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.qc-step-date{font-size:9px;color:var(--text2);margin-top:1px}
.qc-step-days{font-size:9px;font-weight:600;color:var(--accent);background:#f0eeff;padding:0 5px;border-radius:4px;display:inline-block;margin-top:2px}
.qc-line{position:absolute;top:15px;left:25%;right:25%;height:2px;background:#e4e7ec;z-index:1}
.qc-hold-box{background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;padding:10px 14px;margin:8px 0}
.qc-hold-reason{font-size:11px;color:#e65100;font-weight:500;margin-bottom:6px}
.qc-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.qc-link{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;transition:.15s}
.qc-link-report{background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb}
.qc-link-report:hover{background:#bbdefb}
.qc-link-slack{background:#f3e5f5;color:#6a1b9a;border:1px solid #e1bee7}
.qc-link-slack:hover{background:#e1bee7}
.qc-total{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.qc-total.fast{background:#e8f5e9;color:#1b5e20}
.qc-total.medium{background:#fff8e1;color:#f57f17}
.qc-total.slow{background:#ffebee;color:#c62828}




/* Batching & Refund styles */
.batch-count{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.refund-flag{background:#fce4ec;color:#c62828;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.batch-hdr-count{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.refund-hdr-flag{background:#fce4ec;color:#c62828;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.batch-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.batch-row{display:grid;grid-template-columns:1fr 1fr 1fr 1.5fr;gap:8px;padding:6px 10px;background:var(--card-bg,#fff);border:1px solid var(--border,#e5e5e5);border-radius:6px;font-size:11px;align-items:center}
.batch-num{font-weight:600;color:var(--accent,#2563eb)}
.batch-status{font-size:11px}
.batch-date{color:var(--text2,#666);font-size:10px}
.batch-trk{font-family:monospace;font-size:10px;color:var(--text2,#666);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.batch-empty{text-align:center;padding:16px;color:var(--text2,#666);font-size:12px;background:var(--card-bg,#f8f8f8);border-radius:6px;border:1px dashed var(--border,#ddd)}
.refund-detail{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:#fce4ec;border-radius:6px;font-size:12px;color:#c62828;font-weight:500}
.refund-icon{font-weight:800;font-size:14px}


/* Batching & Refund styles */
.batch-count{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}

.batch-hdr-count{background:#e3f2fd;color:#1565c0;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.refund-hdr-flag{background:#fce4ec;color:#c62828;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-left:6px}
.batch-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.batch-row{display:grid;grid-template-columns:1fr 1fr 1fr 1.5fr;gap:8px;padding:6px 10px;background:var(--card-bg,#fff);border:1px solid var(--border,#e5e5e5);border-radius:6px;font-size:11px;align-items:center}
.batch-num{font-weight:600;color:var(--accent,#2563eb)}
.batch-status{font-size:11px}

.refund-detail{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:#fce4ec;border-radius:6px;font-size:12px;color:#c62828;font-weight:500}
.refund-icon{font-weight:800;font-size:14px}


/* ===== ALERTS TAB ===== */
.alerts-wrap{padding:12px 16px;max-width:1200px;margin:0 auto}





.alert-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.alert-title{font-weight:700;font-size:13px;color:var(--text)}
.alert-count{font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;min-width:24px;text-align:center}
.alert-body{padding:0 16px 14px;border-top:1px solid var(--border)}
.alert-table{margin-top:10px}
.at-hdr{display:grid;grid-template-columns:140px 60px 1fr;gap:8px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;padding:6px 0;border-bottom:1px solid var(--border)}
.at-row{display:grid;grid-template-columns:140px 60px 1fr;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:12px;align-items:center}
.at-am{font-weight:700;color:var(--text)}
.at-cnt{font-weight:700;color:#e91e63;text-align:center}
.at-ids{display:flex;flex-wrap:wrap;gap:4px}
.at-id{background:#f5f5f5;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;color:var(--accent);cursor:pointer;transition:background .15s}
.at-id:hover{background:#e3f2fd}
.alert-mini-table{margin-top:10px}
.amt-row{display:grid;grid-template-columns:110px 1fr 120px 100px 100px;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:11px;align-items:center;cursor:pointer}
.amt-row:hover{background:#fafafa}
.amt-id{font-weight:700;color:var(--accent)}
.amt-vendor{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.amt-delay{font-weight:700;font-size:11px}
.amt-am{color:var(--text2);font-size:10px}
.stuck-grid{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.stuck-band{padding:10px 12px;border-radius:8px;border:1px solid var(--border)}
.stuck-band-hdr{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text)}
.stuck-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.stuck-cnt{background:#f5f5f5;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-left:4px}

/* ===== AM VIEW ===== */
.am-wrap{padding:12px 16px;max-width:1400px;margin:0 auto}
.am-selector{margin-bottom:12px}
.am-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.am-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#f5f5f5;color:var(--text);border:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px}
.am-pill:hover{background:#e8eaf6}
.am-pill.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.am-pill-cnt{background:rgba(0,0,0,.1);padding:1px 7px;border-radius:10px;font-size:10px}
.am-pill.active .am-pill-cnt{background:rgba(255,255,255,.25)}
.am-summary{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.am-s-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px}
.am-s-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.am-s-card{background:#f8f9fa;border-radius:8px;padding:10px 8px;text-align:center;border:1px solid var(--border)}
.am-s-num{font-size:22px;font-weight:800;color:var(--text)}
.am-s-lbl{font-size:9px;color:var(--text2);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.am-s-green .am-s-num{color:#2e7d32}
.am-s-orange .am-s-num{color:#e65100}
.am-s-red .am-s-num{color:#d32f2f}
.am-s-pink .am-s-num{color:#e91e63}
.am-s-dark .am-s-num{color:#c62828}
.am-s-purple .am-s-num{color:#6a1b9a}
.am-s-brown .am-s-num{color:#4e342e}

<script type="text/babel">
const{useState,useMemo}=React;
const SM={CREATED:{l:'New Order',c:'b-created'},ACCEPTED:{l:'Accepted',c:'b-accepted'},PICKUP_READY:{l:'Pickup Ready',c:'b-pickup'},PICKUP_SUCCESSFULL:{l:'Picked Up',c:'b-pickup'},PICKUP_FAILED:{l:'Pickup Failed',c:'b-pickup-fail'},QC_PENDING:{l:'QC Pending',c:'b-qc-pending'},QC_APPROVED:{l:'QC Approved',c:'b-qc-approved'},QC_HOLD:{l:'QC Hold',c:'b-qc-hold'},QC_REJECTED:{l:'QC Rejected',c:'b-qc-rejected'},HANDED_OVER_TO_LOGISTICS_PARTNER:{l:'LP Handover',c:'b-lp'},FREIGHT:{l:'Freight',c:'b-freight'},FREIGHT_DEPARTED:{l:'Freight Dep.',c:'b-freight-dep'},FREGHT_CUSTOMS:{l:'Freight Customs',c:'b-freight'},COURIER:{l:'Courier',c:'b-courier'},COURIER_CUSTOMS:{l:'Courier Customs',c:'b-courier-cust'}};
const ZC={'PK - Zone':'zone-pk-z','PK - Non Zone':'zone-pk-nz','IN':'zone-in','ROW':'zone-row'};
const SC={'Air':'ship-air','Sea':'ship-sea','Sea-Air':'ship-seaair'};
const CSM={1:'Created',2:'Dispatched',3:'Pend. Docs',4:'Pend. Dispatch',5:'Pend. Finance',6:'In Transit',7:'At Port',8:'Customs',9:'Delivered'};
const CSC={1:'#94a3b8',2:'#eab308',3:'#f97316',4:'#f97316',5:'#f97316',6:'#3b82f6',7:'#8b5cf6',8:'#d946ef',9:'#22c55e'};
function Badge({s}){const m=SM[s]||{l:s,c:''};return<span className={`badge ${m.c}`}>{m.l}</span>}
function ZoneBadge({z}){if(!z)return<span className="null">-</span>;return<span className={`zone-tag ${ZC[z]||'zone-row'}`}>{z}</span>}
function ShipBadge({m}){if(!m)return<span className="null">-</span>;return<span className={`ship-badge ${SC[m]||'ship-air'}`}>{m}</span>}
function TrackBadge({r}){
  if(r.ot==='awaiting')return<span className="track-tag track-blocked">⏳ Awaiting OMS</span>;
  if(r.ot==null)return<span className="null">-</span>;
  if(r.ot===true)return r.dr<=7?<span className="track-tag track-warn">⚠ Due Soon ({r.dr}d)</span>:<span className="track-tag track-ok">✓ On Track</span>;
  return<span className="track-tag track-delay">✗ Delayed ({Math.abs(r.dr)}d overdue)</span>;
}
function Ag({d}){if(d==null)return<span className="null">-</span>;return<span className={`aging ${d<=14?'a-ok':d<=30?'a-w':'a-bad'}`}>{d}d</span>}
function Gv({v}){if(v==null)return<span className="null">-</span>;return<span className="gmv-v">£{Number(v).toLocaleString('en-GB',{maximumFractionDigits:0})}</span>}
function N({v}){if(v==null||v===''||v==='None')return<span className="null">-</span>;return<span>{v}</span>}
function fmtD(i){if(!i)return null;try{return new Date(i).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return i}}
function db(a,b){if(!a||!b)return null;try{return Math.round((new Date(b)-new Date(a))/(864e5))}catch(e){return null}}
function dfn(i){if(!i)return null;try{return Math.round((new Date()-new Date(i))/864e5)}catch(e){return null}}
function OmsBadge({r}){
  if(r.ofs==='Filled')return<a href={r.ofl} target="_blank" rel="noopener" className="oms-filled" onClick={e=>e.stopPropagation()}>✓ Filled ↗</a>;
  if(r.ofs==='Pending')return<span className="oms-pending">⏳ Pending</span>;
  return<span className="oms-self">Self-Serve</span>;
}

function ContainerDetailModal({c,onClose}){
  if(!c)return null;
  const statusLabels=['CRT','DSP','DOC','FIN','OK','PORT','CUST','DEL'];
  const getStatusDate=i=>{const k='s'+(i+1);return c[k]?fmtD(c[k]):null};
  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal ct-modal">
        <div className="d-head">
          <div className="d-top">
            <div>
              <h2>{c.cn} <span className="ct-size-badge">{c.size||'N/A'}</span></h2>
              <div className="d-item">{c.origin} → {c.dest}</div>
              <div className="d-tags">
                <span style={{background:CSC[c.status],color:'#fff',padding:'4px 10px',borderRadius:4,fontSize:11,fontWeight:600}}>{CSM[c.status]}</span>
                {c.consName&&<span style={{background:'#e3f2fd',color:'#1565c0',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600}}>Consignee: {c.consName}</span>}
              </div>
            </div>
            <button className="close-btn" onClick={onClose}>✕</button>
          </div>
        </div>
        <div className="d-body" style={{maxHeight:'60vh',overflowY:'auto'}}>
          <div className="d-section">
            <h4>Container & Route</h4>
            {[['Container #',c.cn],['Size',c.size||'-'],['Type',c.shipType||'-'],['Origin',c.origin],['Destination',c.dest],['Handover',c.handover||'-']].map(([k,v])=><div key={k} className="d-row"><span className="k">{k}</span><span className="v">{v}</span></div>)}
          </div>
          <div className="d-section">
            <h4>Parties</h4>
            {[['Shipper',c.shipperName||'-'],['Exporter',c.exporter||'-'],['Clearing Agent',c.clearAgent||'-'],['Clearing POC',c.clearPOC||'-']].map(([k,v])=><div key={k} className="d-row"><span className="k">{k}</span><span className="v">{v}</span></div>)}
          </div>
          <div className="d-section">
            <h4>Consignment</h4>
            {[['Consignee',c.consName||'-'],['Type',c.consType||'-'],['Declaration Type',c.declType||'-'],['Destination Clearance',c.destClear||'-'],['Last Mile',c.lastMile||'-'],['VAT By',c.vatBy||'-']].map(([k,v])=><div key={k} className="d-row"><span className="k">{k}</span><span className="v">{v}</span></div>)}
          </div>
          <div className="d-section">
            <h4>Weight & Content</h4>
            {[['Gross Weight (kg)',c.grossKg?c.grossKg.toLocaleString():'-'],['Net Weight (kg)',c.netKg?c.netKg.toLocaleString():'-'],['Boxes',c.boxes||'-']].map(([k,v])=><div key={k} className="d-row"><span className="k">{k}</span><span className="v">{v}</span></div>)}
          </div>
          <div className="d-section">
            <h4>Status Timeline</h4>
            <div className="ct-timeline">
              {['Created','Dispatched','Pend. Docs','Pend. Dispatch','Pend. Finance','In Transit','At Port','Customs','Delivered'].map((lbl,i)=><div key={i} className="ct-timeline-item" style={{opacity:i<c.status?1:0.4}}>
                <div className="ct-tl-dot" style={{background:CSC[i+1]}}/>
                <div className="ct-tl-lbl">{lbl}</div>
                <div className="ct-tl-date">{getStatusDate(i)||'-'}</div>
              </div>)}
            </div>
          </div>
          <div className="d-section">
            <h4>Tracking & Orders</h4>
            {[['Days in Transit',c.dit||0],['Orders',c.orders||'-'],['Sellers',c.sellers||'-'],['Buyers',c.buyers||'-']].map(([k,v])=><div key={k} className="d-row"><span className="k">{k}</span><span className="v">{v}</span></div>)}
          </div>
          <div className="d-section">
            <a href="https://fleek-container-mgmt.netlify.app/" target="_blank" rel="noopener" style={{display:'inline-block',padding:'10px 16px',background:'#6c5ce7',color:'#fff',borderRadius:6,textDecoration:'none',fontSize:12,fontWeight:600}}>Open Container Management Dashboard ↗</a>
          </div>
        </div>
      </div>
    </div>
  );
}

function DetailModal({r,onClose}){
  if(!r)return null;
  const steps=[
    {key:'placed',label:'PLACED',ts:r.cat_iso,date:fmtD(r.cat_iso)},
    {key:'accepted',label:'ACCEPTED',ts:r.t_acc,date:fmtD(r.t_acc)},
    {key:'pickup',label:'PICKUP',ts:r.t_ps||r.t_pr,date:fmtD(r.t_ps||r.t_pr),warn:!!r.t_pf},
    {key:'qc_pending',label:'QC PENDING',ts:r.t_qp,date:fmtD(r.t_qp)},
    {key:'qc_approved',label:'QC APPROVED',ts:r.t_qa,date:fmtD(r.t_qa),warn:!!r.t_qh&&!r.t_qa},
    {key:'handover',label:'HANDOVER',ts:r.t_lp,date:fmtD(r.t_lp)},
    {key:'freight',label:'FREIGHT',ts:r.t_fr,date:fmtD(r.t_fr)},
    {key:'courier',label:'COURIER',ts:r.t_co,date:fmtD(r.t_co)},
    {key:'delivered',label:'DELIVERED',ts:r.t_del,date:fmtD(r.t_del)}
  ];
  for(let i=0;i<steps.length;i++){
    if(steps[i].ts){const nx=steps.slice(i+1).find(s=>s.ts);
      if(nx)steps[i].days=db(steps[i].ts,nx.ts);
      else{steps[i].days=dfn(steps[i].ts);steps[i].current=true}}
  }
  const lastDone=steps.reduce((a,s,i)=>s.ts?i:a,-1);
  const fillPct=steps.length>1?((lastDone)/(steps.length-1))*100:0;
  const isPending=r.ot==='awaiting';
  const totalDays=r.efd_iso&&r.cat_iso?Math.max(1,Math.round((new Date(r.efd_iso)-new Date(r.cat_iso))/864e5)):21;
  const elapsed=r.age||0;
  const qcDone=!!r.t_qa;
  const ffOnTime=qcDone&&r.efd_iso?new Date(r.t_qa)<=new Date(r.efd_iso):qcDone;
  const ffDelayDays=qcDone&&r.efd_iso&&!ffOnTime?Math.round((new Date(r.t_qa)-new Date(r.efd_iso))/864e5):0;
  const ffPct=isPending?0:qcDone?100:Math.min(99,Math.round((elapsed/totalDays)*100));
  const ffBarColor=isPending?'#ccc':qcDone?(ffOnTime?'var(--green)':'var(--red)'):r.ot===false?'var(--red)':r.dr!=null&&r.dr<=7?'var(--orange)':'var(--green)';
  const tns=r.tns||[];const tcs=r.tcs||[];const fsts=r.fsts||[];const fdts=r.fdts||[];
  const fns=r.fns||[];const lps=r.lps||[];const fbs=r.fbs||[];

  // QC aging calculations
  const qcEntryDays=db(r.t_qp,r.t_qh||r.t_qa||(new Date().toISOString()));
  const qcHoldDays=r.t_qh?db(r.t_qh,r.t_qa||(new Date().toISOString())):null;
  const qcPendToHold=r.t_qh?db(r.t_qp,r.t_qh):null;

  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal">
        <div className="d-head">
          <div className="d-top">
            <div>
              <h2>{r.fid} <span>· {r.v}</span></h2>
              <div className="d-item">{r.in}</div>
              <div className="d-tags">
                <ZoneBadge z={r.zm}/>
                <span className="gmv-tag">£{Number(r.gmv).toLocaleString('en-GB',{maximumFractionDigits:0})}</span>
                <Badge s={r.st}/>
                <OmsBadge r={r}/>
                <TrackBadge r={r}/>
                {r.shm&&<ShipBadge m={r.shm}/>}
                {r.rw&&<span className="rework-tag">↻ REWORK</span>}
                {r.am&&r.am!=='Self Serve'&&<span style={{background:'#ede9fe',color:'#6c5ce7',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600}}>AM: {r.am}</span>}
                {r.bc>0&&<span style={{background:'#e3f2fd',color:'#1565c0',padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600}}>{r.bc} Batch{r.bc>1?'es':''}</span>}
                {r.rfc>0&&<span className="refund-flag">£ Refund</span>}
              </div>
            </div>
            <button className="close-btn" onClick={onClose}>✕</button>
          </div>
        </div>
        <div className="timeline">
          <div style={{position:'relative'}}>
            <div className="tl-line"><div className="tl-line-fill" style={{width:fillPct+'%'}}/></div>
            <div className="tl-track">
              {steps.map((s,i)=>(
                <div className="tl-step" key={s.key}>
                  <div className={`tl-dot ${s.warn?'warn':s.ts?(i<=lastDone?'done':''):''}${s.current&&!s.warn?' active':''}`}/>
                  <div className="tl-label">{s.label}</div>
                  <div className="tl-date">{s.date||'-'}</div>
                  {s.days!=null&&<div className="tl-days">{s.days}d{s.current?' now':''}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="d-body">
          <div className="d-section">
            <h4>Order</h4>
            {[['Fleek ID',r.fid],['Month',r.mo],['Customer',r.cn],['Vendor',r.v],['Item',r.in],
              ['GMV','£'+Number(r.gmv).toLocaleString()],['Zone Mapping',null],['Country',r.cc],
              ['Self Ship',r.ss!=null?(r.ss?'Yes':'No'):'-'],['Customer Type',r.ct],
              ['Rework Order',null]
            ].map(([k,v])=>{
              if(k==='Zone Mapping')return<div className="d-row" key={k}><span className="k">{k}</span><span className="v"><ZoneBadge z={r.zm}/></span></div>;
              if(k==='Rework Order')return<div className="d-row" key={k}><span className="k">{k}</span><span className="v">{r.rw?<span className="rw-badge-detail">↻ Yes — Rework</span>:<span style={{color:'var(--green)',fontWeight:600}}>No</span>}</span></div>;
              return<div className="d-row" key={k}><span className="k">{k}</span><span className="v">{v||'-'}</span></div>
            })}
          </div>
          <div className="d-section">
            <h4>Fulfillment</h4>
            <div className="d-row"><span className="k">Order Date</span><span className="v">{fmtD(r.cat_iso)||'-'}</span></div>
            <div className="d-row"><span className="k">Shipping Mode</span><span className="v">{isPending?<span style={{color:'#880e4f'}}>Awaiting OMS</span>:<ShipBadge m={r.shm}/>}</span></div>
            {isPending&&<div className="oms-block"><div className="oms-block-icon">⚠️</div><div><div className="oms-block-text">OMS Form Not Filled — Delivery Cannot Be Calculated</div><div className="oms-block-sub">AM is tagged ({r.am}) but the OMS form has not been submitted yet.</div></div></div>}
            {!isPending&&<div className="ff-calc">📐 <strong>Targeted FF = Delivery Date – {r.shm_buf}d</strong> ({r.shm} buffer)</div>}
            <div className="d-row"><span className="k">Delivery Date</span><span className="v" style={{fontWeight:600}}>{isPending?<span style={{color:'#880e4f'}}>Awaiting OMS</span>:<>{r.dd||'-'} <span style={{fontSize:10,fontWeight:400,color:'var(--text2)',marginLeft:4}}>({r.dd_src==='OMS'?'from OMS':r.dd_src==='OMS (no date)'?'OMS (no date set)':'Air · 21 days'})</span></>}</span></div>
            <div className="d-row"><span className="k">Targeted FF Date</span><span className="v" style={{fontWeight:700,color:isPending?'#880e4f':(r.dr!=null&&r.dr<0?'var(--red)':'var(--text)')}}>{isPending?'Awaiting OMS':(r.efd||'-')}</span></div>
            <div className="d-row"><span className="k">Days to FF Deadline</span><span className={`v ${isPending?'':(r.dr!=null?(r.dr<0?'red':r.dr<=7?'orange':'green'):'')}`} style={{fontWeight:700}}>{isPending?<span style={{color:'#880e4f'}}>—</span>:(r.dr!=null?(r.dr>=0?`${r.dr} days left`:`${Math.abs(r.dr)} days overdue`):'-')}</span></div>
            <div className="d-row"><span className="k">Days to Delivery</span><span className={`v ${isPending?'':(r.drd!=null?(r.drd<0?'red':r.drd<=7?'orange':'green'):'')}`}>{isPending?<span style={{color:'#880e4f'}}>—</span>:(r.drd!=null?(r.drd>=0?`${r.drd} days`:`${Math.abs(r.drd)} days overdue`):'-')}</span></div>

function AlertCard({icon,title,count,color,children,defaultOpen}){
  const[open,setOpen]=useState(!!defaultOpen);

    <div className="alert-hdr" onClick={()=>setOpen(!open)} style={{cursor:'pointer'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:16}}>{icon}</span>
        <span className="alert-title">{title}</span>
        <span className="alert-count" style={{background:color,color:'#fff'}}>{count}</span>
      </div>
      <span style={{fontSize:12,color:'var(--text2)',transition:'transform .2s',transform:open?'rotate(180deg)':'rotate(0)'}}>{'\u25BC'}</span>
    </div>

  </div>;
}

function OrderTable({rows,cols,tSort,sC,sD,setSel,pg,setPg,PS}){
  const paged=rows.slice(pg*PS,(pg+1)*PS);

  return<>
    <div className="tw" style={{maxHeight:'calc(100vh - 240px)',overflowY:'auto'}}>
      <table><thead><tr className="hr">
        {cols.map(c=><th key={c.k} onClick={()=>tSort(c.sk)}>{c.l}{sC===c.sk?<span style={{marginLeft:3,fontSize:9}}>{sD==='asc'?'\u25B2':'\u25BC'}</span>:<span style={{marginLeft:3,fontSize:9,opacity:.4}}>{'\u21C5'}</span>}</th>)}
      </tr></thead>
      <tbody>{paged.map((r,i)=>(
        <tr key={r.fid+'-'+i} onClick={()=>setSel(r)}>
          <td style={{color:'var(--accent)',fontWeight:600}}>{r.fid}</td>
          <td><N v={r.v}/></td><td title={r.cn}><N v={r.cn}/></td>
          <td><N v={r.mo}/></td><td><Gv v={r.gmv}/></td><td><Ag d={r.age}/></td>
          <td><ZoneBadge z={r.zm}/></td>
          <td>{r.rw?<span className="rework-tag">{'\u21BB'} Rework</span>:<span className="null">-</span>}</td>
          <td><Badge s={r.st}/></td>
          <td><Ag d={r.sa}/></td>
          <td><TrackBadge r={r}/></td>
          <td><ShipBadge m={r.shm}/></td>
          <td><OmsBadge r={r}/></td>
          <td><N v={r.am&&r.am!=='Self Serve'?r.am:null}/></td>
          <td>{r.ot==='awaiting'?<span style={{color:'#880e4f',fontSize:10,fontWeight:600}}>Awaiting OMS</span>:<N v={r.efd}/>}</td>
          <td>{r.ot==='awaiting'?<span style={{color:'#880e4f',fontSize:10}}>{'\u2014'}</span>:(r.dr!=null?<span className={`aging ${r.dr<0?'a-bad':r.dr<=7?'a-w':'a-ok'}`}>{r.dr}d</span>:<span className="null">-</span>)}</td>
          <td><N v={r.dd}/></td>
          <td>{r.tnc>0?<span className="trk-count">{r.tnc}</span>:<span className="null">-</span>}</td>
          <td>{r.bc>0?<span className="batch-count">{r.bc}</span>:<span className="null">-</span>}</td>
          <td>{r.rfc>0?<span className="refund-flag">{'\u00A3'} Refund</span>:<span className="null">-</span>}</td>
        </tr>
      ))}</tbody></table>
    </div>
    <div className="pag">
      <button disabled={pg===0} onClick={()=>setPg(0)}>{'\u00AB'} First</button>
      <button disabled={pg===0} onClick={()=>setPg(p=>p-1)}>{'\u2039'} Prev</button>
      <span>Page {pg+1} of {tP} ({rows.length} rows)</span>
      <button disabled={pg>=tP-1} onClick={()=>setPg(p=>p+1)}>Next {'\u203A'}</button>
      <button disabled={pg>=tP-1} onClick={()=>setPg(tP-1)}>Last {'\u00BB'}</button>
    </div>
  </>;
}

    if(amSearch){const s=amSearch.toLowerCase();d=d.filter(r=>(r.fid||'').toLowerCase().includes(s)||(r.v||'').toLowerCase().includes(s)||(r.cn||'').toLowerCase().includes(s)||(r.in||'').toLowerCase().includes(s))}
    if(amStF)d=d.filter(r=>r.st===amStF);
    if(amOtF){if(amOtF==='on')d=d.filter(r=>r.ot===true&&r.dr>7);else if(amOtF==='due')d=d.filter(r=>r.ot===true&&r.dr!=null&&r.dr<=7);else if(amOtF==='delay')d=d.filter(r=>r.ot===false);else if(amOtF==='await')d=d.filter(r=>r.ot==='awaiting')}
    if(amOmsF)d=d.filter(r=>r.ofs===amOmsF);
    d=[...d].sort((a,b)=>{let va=a[amSC],vb=b[amSC];if(va==null)return 1;if(vb==null)return -1;if(typeof va==='number')return amSD==='asc'?va-vb:vb-va;return amSD==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va))});
    return d;
  },[amTab,amSearch,amStF,amOtF,amOmsF,amSC,amSD]);

  const tSort=c=>{if(sC===c)setSD(d=>d==='asc'?'desc':'asc');else{setSC(c);setSD('desc')}setPg(0)};
  const amTSort=c=>{if(amSC===c)setAmSD(d=>d==='asc'?'desc':'asc');else{setAmSC(c);setAmSD('desc')}setAmPg(0)};
  const clr=()=>{setSearch('');setStF('');setMoF('');setZF('');setAgF('');setOtF('');setOmsF('');setAmF('');setRwF('');setSmF('');setPg(0)};

  // Container computed values
  const ctFiltered=useMemo(()=>{
    let d=cData;
    if(ctSearch){const s=ctSearch.toLowerCase();d=d.filter(c=>(c.cn||'').toLowerCase().includes(s)||(c.sellers||'').toLowerCase().includes(s)||(c.buyers||'').toLowerCase().includes(s)||(c.orders||'').toLowerCase().includes(s))}
    if(ctStF)d=d.filter(c=>c.status===parseInt(ctStF));
    return d;
  },[ctSearch,ctStF]);

  const ctStats=useMemo(()=>{
    const total=cData.length;
    const delivered=cData.filter(c=>c.status===9).length;
    const active=total-delivered;
    const bySt={};
    cData.forEach(c=>{const st=c.status;bySt[st]=(bySt[st]||0)+1});
    return{total,active,delivered,bySt};
  },[cData]);

  // ===== OVERVIEW: Computed metrics =====
  const stCounts=useMemo(()=>{const m={};data.forEach(r=>{const s=r.st||'UNKNOWN';m[s]=(m[s]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1])},[]);
  const omsPending=useMemo(()=>data.filter(r=>r.ofs==='Pending'),[]);
  const omsByAM=useMemo(()=>{const m={};omsPending.forEach(r=>{const a=r.am||'Unassigned';if(!m[a])m[a]=[];m[a].push(r)});return Object.entries(m).sort((a,b)=>b[1].length-a[1].length)},[omsPending]);
  // Pre-QC statuses = not yet fulfilled
  const preQC=['CREATED','ACCEPTED','PICKUP_READY','PICKUP_SUCCESSFULL','PICKUP_FAILED','QC_PENDING','QC_HOLD','QC_REJECTED'];
  const ffDelayed=useMemo(()=>data.filter(r=>preQC.includes(r.st)&&r.ot===false),[]);
  // Stuck at QC Approved = QC done but not handed over yet
  const qcStuck=useMemo(()=>data.filter(r=>r.st==='QC_APPROVED'),[]);
  // In transit = post-handover statuses
  const transitSts=['HANDED_OVER_TO_LOGISTICS_PARTNER','FREIGHT','FREIGHT_DEPARTED','FREGHT_CUSTOMS','COURIER','COURIER_CUSTOMS'];
  const transitDelayed=useMemo(()=>data.filter(r=>transitSts.includes(r.st)&&r.ot===false),[]);
  const transitAll=useMemo(()=>data.filter(r=>transitSts.includes(r.st)),[]);
  const totalDelayed=useMemo(()=>data.filter(r=>r.ot===false),[]);
  // FF delay by zone
  const delayByZone=useMemo(()=>{const m={};totalDelayed.forEach(r=>{const z=r.zm||'Unknown';if(!m[z])m[z]={cnt:0,gmv:0};m[z].cnt++;m[z].gmv+=(r.gmv||0)});return Object.entries(m).sort((a,b)=>b[1].cnt-a[1].cnt)},[totalDelayed]);
  // FF delay by vendor (top 10)
  const delayByVendor=useMemo(()=>{const m={};totalDelayed.forEach(r=>{const v=r.v||'Unknown';if(!m[v])m[v]={cnt:0,gmv:0};m[v].cnt++;m[v].gmv+=(r.gmv||0)});return Object.entries(m).sort((a,b)=>b[1].cnt-a[1].cnt).slice(0,10)},[totalDelayed]);

  const cols=[
    {k:'fid',l:'Fleek ID',sk:'fid'},{k:'v',l:'Vendor',sk:'v'},{k:'cn',l:'Customer',sk:'cn'},
    {k:'mo',l:'Month',sk:'mo'},{k:'gmv',l:'GMV',sk:'gmv'},{k:'age',l:'Aging',sk:'age'},
    {k:'zm',l:'Zone',sk:'zm'},{k:'rw',l:'Rework',sk:'rw'},{k:'st',l:'Status',sk:'st'},
    {k:'sa',l:'In Status',sk:'sa'},{k:'ot',l:'Track',sk:'dr'},
    {k:'shm',l:'Ship',sk:'shm'},{k:'ofs',l:'OMS',sk:'ofs'},{k:'am',l:'AM',sk:'am'},
    {k:'efd',l:'Target FF',sk:'efd_iso'},{k:'dr',l:'FF Left',sk:'dr'},
    {k:'dd',l:'Delivery',sk:'dd_iso'},
    {k:'tnc',l:'Tracking',sk:'tnc'},
    {k:'bc',l:'Batches',sk:'bc'},
    {k:'rfc',l:'Refund',sk:'rfc'}
  ];

  // AM summary stats helper
  const amStats=useMemo(()=>{
    if(!amTab)return null;
    const all=data.filter(r=>r.am===amTab);
    const ffDel=all.filter(r=>r.ot===false&&!r.t_qa).length;
    const trDel=all.filter(r=>{const inT=['HANDED_OVER_TO_LOGISTICS_PARTNER','FREIGHT','FREIGHT_DEPARTED','FREGHT_CUSTOMS','COURIER','COURIER_CUSTOMS'];return inT.includes(r.st)&&r.ot===false}).length;
    const omsPend=all.filter(r=>r.ofs==='Pending').length;
    const onTrk=all.filter(r=>r.ot===true&&r.dr>7).length;
    const dueSn=all.filter(r=>r.ot===true&&r.dr!=null&&r.dr<=7).length;
    const stuck10=all.filter(r=>r.sa>=10).length;
    const old30=all.filter(r=>r.age>=30).length;
    const tGmv=all.reduce((s,r)=>s+(r.gmv||0),0);
    const avgAge=all.length?all.reduce((s,r)=>s+(r.age||0),0)/all.length:0;
    const refunds=all.filter(r=>r.rfc>0).length;
    return{total:all.length,ffDel,trDel,omsPend,onTrk,dueSn,stuck10,old30,tGmv,avgAge,refunds};
  },[amTab]);

  return(
    <div>
      <div className="topbar">
        <div><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:32,height:32,borderRadius:8,background:'#6c5ce7',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:15}}>F</div><div><h1 style={{fontSize:17}}>Large Orders {'\u2014'} Live Dashboard</h1><div className="sub">GMV {'\u2265'} {'\u00A3'}2,000 {'\u00B7'} Open orders {'\u00B7'} Jul 2025+</div></div></div></div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{fontSize:12,color:'var(--text2)'}}>{data.length} orders {'\u00B7'} {'\u00A3'}{(data.reduce((s,r)=>s+(r.gmv||0),0)/1000).toFixed(0)}K GMV</div>
          <div className="live-badge">Live</div>
        </div>
      </div>
      <div className="tabs">
        <div className={`tab ${tab==='overview'?'active':''}`} onClick={()=>setTab('overview')}>{'\u26A0\uFE0F'} Alerts</div>
        <div className={`tab ${tab==='all'?'active':''}`} onClick={()=>setTab('all')}>{'\uD83D\uDCCB'} All Orders</div>
        <div className={`tab ${tab==='am'?'active':''}`} onClick={()=>{setTab('am');if(!amTab&&ams.length)setAmTab(ams[0])}}>{'\uD83D\uDC64'} AM View</div>
        <div className={`tab ${tab==='containers'?'active':''}`} onClick={()=>setTab('containers')}>{'\uD83D\uDCE6'} Containers</div>
      </div>

      {/* ===== ALERTS TAB ===== */}
      {tab==='overview'&&<div className="alerts-wrap">

        {/* --- SECTION 1: Total + Status Summary --- */}
        <div className="ov-header">
          <div className="ov-total"><span className="ov-total-num">{data.length}</span> Open Orders</div>
          <div className="ov-gmv">{'\u00A3'}{(data.reduce((s,r)=>s+(r.gmv||0),0)/1000).toFixed(0)}K total GMV</div>
        </div>
        <div className="status-summary">
          {stCounts.map(([st,cnt])=><div key={st} className="ss-item"><span className="ss-cnt">{cnt}</span><span className="ss-label">{SM[st]?.l||st}</span></div>)}
        </div>

        {/* --- SECTION 2: Delayed Orders --- */}
        <div className="ov-section-title">Delayed Orders <span className="ov-section-cnt">{totalDelayed.length} of {data.length}</span></div>

        {/* 2a: Not Fulfilled & Delayed */}
        <AlertCard icon={'\u2757'} title="Not Fulfilled Yet & Already Delayed" count={ffDelayed.length} color="#d32f2f" defaultOpen={true}>
          {ffDelayed.length===0?<div className="alert-empty">No orders in this category</div>:
          <div className="alert-mini-table">
            <div className="amt-hdr"><span>Fleek ID</span><span>Vendor</span><span>Status</span><span>Overdue</span><span>Aging</span><span>AM</span></div>
            {ffDelayed.sort((a,b)=>(a.dr||0)-(b.dr||0)).map(r=><div key={r.fid} className="amt-row" onClick={()=>setSel(r)}>
              <span className="amt-id">{r.fid}</span>
              <span className="amt-vendor">{r.v}</span>
              <span><Badge s={r.st}/></span>
              <span className="amt-delay" style={{color:'var(--red)'}}>{r.dr!=null?`${Math.abs(r.dr)}d`:'-'}</span>
              <span style={{fontSize:11,color:r.age>=30?'var(--red)':'var(--text2)'}}>{r.age}d</span>
              <span className="amt-am">{r.am||'-'}</span>
            </div>)}
          </div>}
        </AlertCard>

        {/* 2b: Stuck at QC Approved */}
        <AlertCard icon={'\u2705'} title="QC Approved but Not Moved Forward" count={qcStuck.length} color="#e65100" defaultOpen={qcStuck.length>0}>
          {qcStuck.length===0?<div className="alert-empty">No orders stuck at QC Approved</div>:
          <div className="alert-mini-table">
            <div className="amt-hdr"><span>Fleek ID</span><span>Vendor</span><span>Days in QC Approved</span><span>Total Aging</span><span>AM</span></div>
            {qcStuck.sort((a,b)=>(b.sa||0)-(a.sa||0)).map(r=><div key={r.fid} className="amt-row" onClick={()=>setSel(r)}>
              <span className="amt-id">{r.fid}</span>
              <span className="amt-vendor">{r.v}</span>
              <span style={{fontWeight:700,color:r.sa>=10?'var(--red)':r.sa>=5?'var(--orange)':'var(--text)'}}>{r.sa}d</span>
              <span style={{fontSize:11,color:r.age>=30?'var(--red)':'var(--text2)'}}>{r.age}d</span>
              <span className="amt-am">{r.am||'-'}</span>
            </div>)}
          </div>}
        </AlertCard>

        {/* 2c: In Transit & Delayed */}
        <AlertCard icon={'\uD83D\uDE9A'} title="In Transit but Delayed" count={transitDelayed.length} color="#1565c0" defaultOpen={transitDelayed.length>0}>
          {transitDelayed.length===0?<div className="alert-empty">No in-transit delays ({transitAll.length} orders in transit, all on track)</div>:
          <div className="alert-mini-table">
            <div className="amt-hdr"><span>Fleek ID</span><span>Vendor</span><span>Status</span><span>Overdue</span><span>Aging</span><span>AM</span></div>
            {transitDelayed.sort((a,b)=>(a.dr||0)-(b.dr||0)).map(r=><div key={r.fid} className="amt-row" onClick={()=>setSel(r)}>
              <span className="amt-id">{r.fid}</span>
              <span className="amt-vendor">{r.v}</span>
              <span><Badge s={r.st}/></span>
              <span className="amt-delay" style={{color:'var(--red)'}}>{r.dr!=null?`${Math.abs(r.dr)}d`:'-'}</span>
              <span style={{fontSize:11,color:r.age>=30?'var(--red)':'var(--text2)'}}>{r.age}d</span>
              <span className="amt-am">{r.am||'-'}</span>
            </div>)}
          </div>}
        </AlertCard>

        {/* --- SECTION 3: OMS Pending --- */}
        <div className="ov-section-title">OMS Pending <span className="ov-section-cnt">{omsPending.length} orders</span></div>
        {omsPending.length>0?<div className="alert-card" style={{borderLeft:'4px solid #e91e63'}}>
          <div style={{padding:'12px 16px'}}>
            <div className="alert-table">
              <div className="at-hdr"><span>AM</span><span>Count</span><span>Orders</span></div>
              {omsByAM.map(([am,orders])=><div key={am} className="at-row">
                <span className="at-am">{am}</span>
                <span className="at-cnt">{orders.length}</span>
                <span className="at-ids">{orders.map(r=><span key={r.fid} className="at-id" onClick={()=>setSel(r)}>{r.fid}</span>)}</span>
              </div>)}
            </div>
          </div>
        </div>:<div className="alert-empty" style={{margin:'0 0 12px'}}>All OMS forms are filled</div>}

        {/* --- SECTION 4: Delay by Zone --- */}
        <div className="ov-section-title">Delayed by Zone</div>
        <div className="delay-summary-grid">
          {delayByZone.map(([z,d])=><div key={z} className="ds-row">
            <span className="ds-zone">{z}</span>
            <span className="ds-cnt">{d.cnt}</span>
            <span className="ds-gmv">{'\u00A3'}{(d.gmv/1000).toFixed(0)}K</span>
            <div className="ds-bar-bg"><div className="ds-bar-fill" style={{width:Math.round(d.cnt/totalDelayed.length*100)+'%'}}/></div>
          </div>)}
        </div>

        {/* --- SECTION 5: Delay by Vendor (Top 10) --- */}
        <div className="ov-section-title">Delayed by Vendor <span className="ov-section-cnt">Top 10</span></div>
        <div className="delay-summary-grid">
          {delayByVendor.map(([v,d])=><div key={v} className="ds-row">
            <span className="ds-vendor">{v}</span>
            <span className="ds-cnt">{d.cnt}</span>
            <span className="ds-gmv">{'\u00A3'}{(d.gmv/1000).toFixed(0)}K</span>
            <div className="ds-bar-bg"><div className="ds-bar-fill" style={{width:Math.round(d.cnt/totalDelayed.length*100)+'%'}}/></div>
          </div>)}
        </div>
      </div>}

      {/* ===== ALL ORDERS TAB ===== */}
      {tab==='all'&&<>
        <div className="filters">
          <input className="search" placeholder="Search Fleek ID, vendor, customer, tracking..." value={search} onChange={e=>{setSearch(e.target.value);setPg(0)}}/>
          <select value={stF} onChange={e=>{setStF(e.target.value);setPg(0)}}><option value="">All Statuses</option>{sts.map(s=><option key={s} value={s}>{SM[s]?.l||s}</option>)}</select>
          <select value={zF} onChange={e=>{setZF(e.target.value);setPg(0)}}><option value="">All Zones</option>{zns.map(z=><option key={z} value={z}>{z}</option>)}</select>
          <select value={moF} onChange={e=>{setMoF(e.target.value);setPg(0)}}><option value="">All Months</option>{mos.map(m=><option key={m} value={m}>{m}</option>)}</select>
          <select value={agF} onChange={e=>{setAgF(e.target.value);setPg(0)}}><option value="">All Aging</option><option value="0-14">0-14d</option><option value="15-30">15-30d</option><option value="31-60">31-60d</option><option value="60+">60d+</option></select>
          <select value={otF} onChange={e=>{setOtF(e.target.value);setPg(0)}}><option value="">All Tracks</option><option value="on">On Track</option><option value="due">Due Soon</option><option value="delay">Delayed</option><option value="await">Awaiting OMS</option></select>
          <select value={smF} onChange={e=>{setSmF(e.target.value);setPg(0)}}><option value="">All Shipping</option>{sms.map(s=><option key={s} value={s}>{s}</option>)}</select>
          <select value={omsF} onChange={e=>{setOmsF(e.target.value);setPg(0)}}><option value="">All OMS</option><option value="Filled">Filled</option><option value="Pending">Pending</option><option value="Self-Serve">Self-Serve</option></select>
          <select value={amF} onChange={e=>{setAmF(e.target.value);setPg(0)}}><option value="">All AMs</option>{ams.map(a=><option key={a} value={a}>{a}</option>)}</select>
          <select value={rwF} onChange={e=>{setRwF(e.target.value);setPg(0)}}><option value="">All Orders</option><option value="yes">Rework Only</option><option value="no">Non-Rework</option></select>
          <button className="clear-btn" onClick={clr}>{'\u2715'} Clear</button>
          <div className="count-badge">{filtered.length} orders</div>
        </div>
        <OrderTable rows={filtered} cols={cols} tSort={tSort} sC={sC} sD={sD} setSel={setSel} pg={pg} setPg={setPg} PS={PS}/>
      </>}

      {/* ===== AM VIEW TAB ===== */}
      {tab==='am'&&<div className="am-wrap">
        <div className="am-selector">
          <label style={{fontSize:12,fontWeight:600,color:'var(--text2)'}}>Select Account Manager:</label>
          <div className="am-pills">{ams.map(a=><div key={a} className={`am-pill ${amTab===a?'active':''}`} onClick={()=>{setAmTab(a);setAmPg(0);setAmSearch('');setAmStF('');setAmOtF('');setAmOmsF('')}}>
            {a} <span className="am-pill-cnt">{data.filter(r=>r.am===a).length}</span>
          </div>)}</div>
        </div>

        {amTab&&amStats&&<>
          <div className="am-summary">
            <div className="am-s-title">{amTab} {'\u2014'} Summary</div>
            <div className="am-s-grid">
              <div className="am-s-card"><div className="am-s-num">{amStats.total}</div><div className="am-s-lbl">Total Orders</div></div>
              <div className="am-s-card"><div className="am-s-num">{'\u00A3'}{(amStats.tGmv/1000).toFixed(0)}K</div><div className="am-s-lbl">Total GMV</div></div>
              <div className="am-s-card"><div className="am-s-num">{amStats.avgAge.toFixed(0)}d</div><div className="am-s-lbl">Avg Aging</div></div>
              <div className="am-s-card am-s-green"><div className="am-s-num">{amStats.onTrk}</div><div className="am-s-lbl">On Track</div></div>
              <div className="am-s-card am-s-orange"><div className="am-s-num">{amStats.dueSn}</div><div className="am-s-lbl">Due Soon</div></div>
              <div className="am-s-card am-s-red"><div className="am-s-num">{amStats.ffDel}</div><div className="am-s-lbl">FF Delayed</div></div>
              <div className="am-s-card am-s-red"><div className="am-s-num">{amStats.trDel}</div><div className="am-s-lbl">Transit Delayed</div></div>
              <div className="am-s-card am-s-pink"><div className="am-s-num">{amStats.omsPend}</div><div className="am-s-lbl">OMS Pending</div></div>
              <div className="am-s-card am-s-dark"><div className="am-s-num">{amStats.stuck10}</div><div className="am-s-lbl">Stuck 10d+</div></div>
              <div className="am-s-card am-s-purple"><div className="am-s-num">{amStats.old30}</div><div className="am-s-lbl">Aging 30d+</div></div>
              <div className="am-s-card am-s-brown"><div className="am-s-num">{amStats.refunds}</div><div className="am-s-lbl">Refunds</div></div>
            </div>
          </div>

          <div className="filters" style={{marginTop:12}}>
            <input className="search" placeholder="Search within AM orders..." value={amSearch} onChange={e=>{setAmSearch(e.target.value);setAmPg(0)}}/>
            <select value={amStF} onChange={e=>{setAmStF(e.target.value);setAmPg(0)}}><option value="">All Statuses</option>{sts.map(s=><option key={s} value={s}>{SM[s]?.l||s}</option>)}</select>
            <select value={amOtF} onChange={e=>{setAmOtF(e.target.value);setAmPg(0)}}><option value="">All Tracks</option><option value="on">On Track</option><option value="due">Due Soon</option><option value="delay">Delayed</option><option value="await">Awaiting OMS</option></select>
            <select value={amOmsF} onChange={e=>{setAmOmsF(e.target.value);setAmPg(0)}}><option value="">All OMS</option><option value="Filled">Filled</option><option value="Pending">Pending</option><option value="Self-Serve">Self-Serve</option></select>
            <div className="count-badge">{amData.length} orders</div>
          </div>
          <OrderTable rows={amData} cols={cols} tSort={amTSort} sC={amSC} sD={amSD} setSel={setSel} pg={amPg} setPg={setAmPg} PS={PS}/>
        </>}
        {!amTab&&<div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>Select an Account Manager above to view their orders</div>}
      </div>}

      {/* ===== CONTAINERS TAB ===== */}
      {tab==='containers'&&<div className="ct-wrap">
        <div className="ct-header">
          <div className="ct-total"><span className="ct-total-num">{ctStats.total}</span> Containers</div>
        </div>
        <div className="ct-summary">
          <div className="ct-s-card"><div className="ct-s-num">{ctStats.total}</div><div className="ct-s-lbl">Total</div></div>
          <div className="ct-s-card ct-s-active"><div className="ct-s-num">{ctStats.active}</div><div className="ct-s-lbl">Active</div></div>
          <div className="ct-s-card ct-s-delivered"><div className="ct-s-num">{ctStats.delivered}</div><div className="ct-s-lbl">Delivered</div></div>
          {[1,2,3,4,5,6,7,8,9].map(st=><div key={st} className="ct-s-card ct-s-badge" style={{background:CSC[st]+'40',borderLeft:`3px solid ${CSC[st]}`}}><div className="ct-s-num" style={{color:CSC[st]}}>{ctStats.bySt[st]||0}</div><div className="ct-s-lbl" style={{fontSize:10}}>{CSM[st]}</div></div>)}
        </div>
        <div className="ct-filters">
          <input className="search" placeholder="Search container #, seller, buyer, order..." value={ctSearch} onChange={e=>setCtSearch(e.target.value)}/>
          <select value={ctStF} onChange={e=>setCtStF(e.target.value)}><option value="">All Statuses</option>{[1,2,3,4,5,6,7,8,9].map(st=><option key={st} value={st}>{CSM[st]}</option>)}</select>
          <button className="clear-btn" onClick={()=>{setCtSearch('');setCtStF('')}}>{'\u2715'} Clear</button>
          <div className="count-badge">{ctFiltered.length} containers</div>
        </div>
        <div className="ct-list">
          {ctFiltered.length===0?<div className="ct-empty">No containers found</div>:ctFiltered.map(c=>(
            <div key={c.cn} className="ct-card" onClick={()=>setCtSel(c)}>
              <div className="ct-card-header">
                <div className="ct-cn">{c.cn}</div>
                <span className="ct-size-badge">{c.size||'N/A'}</span>
                <span className="ct-status-badge" style={{background:CSC[c.status],color:'#fff'}}>{CSM[c.status]}</span>
              </div>
              <div className="ct-route">{c.origin} → {c.dest}</div>
              <div className="ct-timeline-dots">
                {['CRT','DSP','DOC','FIN','OK','PORT','CUST','DEL'].map((lbl,i)=><div key={i} className="ct-dot" style={{background:i<c.status?CSC[i+1]:'#e5e7eb'}} title={lbl}/>)}
              </div>
              <div className="ct-footer">
                <div className="ct-info"><span className="ct-label">Sellers:</span> <span className="ct-value">{c.sellers||'-'}</span></div>
                <div className="ct-info"><span className="ct-label">Buyers:</span> <span className="ct-value">{c.buyers||'-'}</span></div>
                <div className="ct-info"><span className="ct-label">Orders:</span> <span className="ct-value">{c.orders||'-'}</span></div>
                <div className="ct-info"><span className="ct-label">DIT:</span> <span className="ct-value">{c.dit}d</span></div>
              </div>
            </div>
          ))}
        </div>
      </div>}

      {sel&&<DetailModal r={sel} onClose={()=>setSel(null)}/>}
      {ctSel&&<ContainerDetailModal c={ctSel} onClose={()=>setCtSel(null)}/>}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));

</script>
</body>
</html>
